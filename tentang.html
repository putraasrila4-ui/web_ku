<!DOCTYPE html>
<html>
<head>
    <title>Tentang Saya</title>
    <style>
        body { background: linear-gradient(135deg, #2c3e50, #000); min-height: 100vh; display: flex; justify-content: center; align-items: center; color: white; font-family: sans-serif; text-align: center; }
        .card { padding: 40px; border: 1px solid #fe2c55; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Selamat Datang! ✨</h1>
        <p>Musik seharusnya sudah otomatis berputar sekarang.</p>
        <audio id="lagu" src="sound-tiktok.mp3" loop></audio>
        <a href="index.html" style="color:#fe2c55; text-decoration:none;">Kembali ke awal</a>
    </div>

    <script>
        window.onload = function() {
            var musikIzin = localStorage.getItem("musik_on");
            var audio = document.getElementById("lagu");
            
            if (musikIzin === "true") {
                audio.play().catch(function(err) {
                    console.log("Browser tetap memblokir, mungkin perlu klik sekali lagi.");
                });
            }
        }
    </script>
</body>
</html>
